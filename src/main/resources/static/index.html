<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculadora</title>
</head>

<body>
    <div class="calculadora">
        <div class="visor-container">
            <input class="visor" type="text" id="visor" readonly />
        </div>
        <div class="botoes">
            <button onclick="adicionarValor('0')">0</button>
            <button onclick="adicionarValor('1')">1</button>
            <button onclick="adicionarValor('2')">2</button>
            <button onclick="adicionarValor('3')">3</button>
            <button onclick="adicionarValor('4')">4</button>
            <button onclick="adicionarValor('5')">5</button>
            <button onclick="adicionarValor('6')">6</button>
            <button onclick="adicionarValor('7')">7</button>
            <button onclick="adicionarValor('8')">8</button>
            <button onclick="adicionarValor('9')">9</button>
            <button onclick="adicionarValor('.')">.</button>
            <button class="operacao" onclick="adicionarValor('+')">+</button>
            <button class="operacao" onclick="adicionarValor('-')">-</button>
            <button class="operacao" onclick="adicionarValor('*')">*</button>
            <button class="operacao" onclick="adicionarValor('/')">/</button>
            <button class="operacao" onclick="calcular()">=</button>
            <button class="limpar" onclick="limpar()">C</button>
        </div>
    </div>
    <script>
        window.onload = function () {
            document.getElementById('visor').value = '0';
        }
        function adicionarValor(valor) {
            if (document.getElementById('visor').value === '0') {
                document.getElementById('visor').value = valor
            } else {
                document.getElementById('visor').value += valor;
            }
        }
        function limpar() {
            document.getElementById('visor').value = "0";
        }
        function calcular() {
            let expressao = document.getElementById('visor').value;
            let operacao;

            if (expressao.includes('+')) operacao = '+';
            else if (expressao.includes('*')) operacao = '*';
            else if (expressao.includes('/')) operacao = '/';
            else if (expressao.includes('-')) operacao = '-';

            if (operacao == undefined) {
                //poderia usar o alert aqui tambem
                document.getElementById('visor').value = ("Comando invalido");
                return;
            }

            // Use regex para detectar o operador na posição correta
            const match = expressao.match(/^(-?[\d.]+)([+\-*\/])(-?[\d.]+)$/);
            if (!match || expressao) {
                document.getElementById('visor').value = "Expressão inválida";
                return;
            }
            const [, v1, op, v2] = match;

            fetch('/calculadora', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    valor1: parseFloat(v1),
                    valor2: parseFloat(v2),
                    operacao: op
                })
            }).then(response => {
                if (!response.ok) return response.text()
                    .then(msg => { throw new Error(msg); });
                return response.json();
            })
                .then(data => { visor.value = data.resultado; })
                .catch(err => { visor.value = "Erro: " + err.message; });
        }
    </script>
</body>

</html>
